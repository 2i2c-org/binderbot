name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Serve the site from the repository subpath on github.io
      BASE_URL: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # Start a Binder session with our own action; this exports the
      # JUPYTER_BASE_URL and JUPYTER_TOKEN env vars so the live-demo page
      # in the docs is executed on mybinder.org rather than on this runner.
      - uses: 2i2c-org/clinder@HEAD
        with:
          hub-url: https://mybinder.org
          repo: binder-examples/requirements
          ref: HEAD
      - name: Build docs
        run: pipx run nox -s docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
